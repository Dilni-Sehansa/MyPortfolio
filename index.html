<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Overflow</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="assets/lib/normalize.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Henny+Penny&family=Kablammo&display=swap" rel="stylesheet">

    <style>
        body {
            background: #00061A;
            margin: 0;
        }

        #nav > div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000927;
            border-bottom: 1px solid whitesmoke;
            padding: 10px 20px;
            position: relative;
        }

        #desktop-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
        }

        nav > a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .logo-name {
            color: deepskyblue;
            font-weight: bold;
        }

        #darkMode {
            cursor: pointer;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .bar {
            width: 25px;
            height: 3px;
            background-color: white;
            border-radius: 5px;
        }


        @media (max-width: 992px) {

            #desktop-nav {
                display: none;
            }

            .menu-toggle {
                display: flex;
            }
        }

        #home {
            color: white;
            padding: 150px 120px 150px 120px;
            font-size: 50px;
            font-weight: bold;
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: 5px;

        }

        #photoHome{
            border-radius: 50%;
            width: 380px;
            height: 380px;
            background: deepskyblue;
            right: 120px;
            top: 150px ;
            position: absolute;
            overflow: hidden;
            border: 5px solid deepskyblue;
            box-shadow: 0px 0px 20px 0px blue;
        }
    </style>
</head>
<body>
<!--/////////////////////////Nav//////////////////////////////////////////////////-->
<section id="nav">
    <div>
        <div class="logo-name">DILNI SEHANSA</div>

        <nav id="desktop-nav">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Projects</a>
            <a href="">Gallery</a>
            <a href="">Contact</a>
            <img src="MyPortfolio/assets/moon.png" id="darkMode" alt="dark mode icon" width="30" height="30">
        </nav>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </div>
</section>


<!--///////////////////////////////////Home//////////////////////////////////////-->


<section id="home">
    <div id="textHome">
        <div>Decoding Problems.</div>
        <div>Encoding Solutions</div>
    </div>

    <div id="photoHome"><img src="MyPortfolio/assets/homephoto.png" width="100%" height="100%"></div>


    <div></div>
</section>



</body>
</html>
